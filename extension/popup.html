<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Send to TikGem</title>
  <style>
    :root {
      --bg: #1c1c1c; --surface: #232323; --surface2: #2a2a2a;
      --border: #353535; --text: #e9e9e7; --dim: #9a9a95; --accent: #5a82ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; width: 360px; background: var(--bg); color: var(--text);
      font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    header {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 14px; border-bottom: 1px solid var(--border);
    }
    header .logo {
      width: 20px; height: 20px; border-radius: 6px; background: var(--accent);
      display: inline-flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800; font-size: 12px;
    }
    header h1 { font-size: 14px; font-weight: 700; margin: 0; }
    main { padding: 12px 14px; }
    label { display: block; font-size: 11px; color: var(--dim); margin: 10px 0 4px; text-transform: uppercase; letter-spacing: .04em; }
    input, textarea {
      width: 100%; background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px;
      font: inherit; resize: vertical;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); }
    textarea { min-height: 84px; }
    .hint { font-size: 11px; color: var(--dim); margin-top: 6px; }
    .row { display: flex; gap: 8px; margin-top: 14px; }
    button {
      flex: 1; border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 12px; font: inherit; font-weight: 600; cursor: pointer;
      background: var(--surface2); color: var(--text);
    }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    #status { font-size: 12px; margin-top: 10px; min-height: 16px; }
    #status.ok { color: #2bb38a; }
    #status.err { color: #e8736f; }
    .loading { color: var(--dim); }
  </style>
</head>
<body>
  <header>
    <span class="logo">T</span>
    <h1>Send page to TikGem</h1>
  </header>
  <main>
    <div id="loading" class="loading">Reading this page…</div>
    <div id="form" style="display:none;">
      <label for="title">Task title</label>
      <input id="title" type="text" placeholder="(untitled capture)" />
      <label for="desc">Description</label>
      <textarea id="desc" placeholder="Page description and link"></textarea>
      <div class="hint">Tip: <code>#tag</code>, <code>+⚡</code> priority and <code>$🍅</code> energy in the title are parsed by TikGem.</div>
      <div id="defaults" class="hint" style="display:none;"></div>
      <div class="row">
        <button id="cancel">Cancel</button>
        <button id="send" class="primary">Send to TikGem</button>
      </div>
      <div id="status"></div>
      <div class="hint" style="margin-top:10px;"><a id="openOptions" href="#" style="color:var(--accent);">Edit defaults &amp; options</a></div>
    </div>
  </main>
  <script src="settings.js"></script>
  <script src="popup.js"></script>
</body>
</html>
